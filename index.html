<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>aMaze</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="game-wrapper">
    <div class="side-panel player-info">
      <h2>Player</h2>
      <div class="stat-row">
        <span class="stat-label">Health</span>
        <div class="health-bar">
          <div id="health-fill"></div>
          <span id="health-text">100</span>
        </div>
      </div>
    </div>

    <div class="center-column">
      <h1>aMaze</h1>
      <span id="level-display">Level 1</span>
      <canvas id="maze-canvas"></canvas>
    </div>

    <div class="side-panel mob-info">
      <div class="mob-entry hidden" id="dragon-entry">
        <h2 id="dragon-name">???</h2>
        <div class="stat-row">
          <span class="stat-label">Health</span>
          <div id="dragon-health-bar" class="health-bar dragon-health-bar">
            <div id="dragon-health-fill"></div>
          </div>
        </div>
      </div>
    </div>
  </main>
  <div id="game-over-overlay" class="hidden">
    <div class="game-over-box">
      <h2>Game Over</h2>
      <button id="restart-btn">Restart</button>
    </div>
  </div>
  <script src="game.js"></script>
</body>
</html>
