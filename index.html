<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>aMaze</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="game-wrapper">
    <div class="side-panel player-info">
      <h2>Player</h2>
      <div class="stat-row">
        <span class="stat-label">Health</span>
        <div class="health-bar">
          <div id="health-fill"></div>
          <span id="health-text">100</span>
        </div>
      </div>
      <div class="stat-row">
        <span class="stat-label">Mana</span>
        <div class="health-bar mana-bar">
          <div id="mana-fill"></div>
          <span id="mana-text">10</span>
        </div>
      </div>
      <div class="stat-row turn-events-row">
        <span class="stat-label">Events</span>
        <p id="turn-events">&nbsp;</p>
      </div>

      <div class="controls-legend">
        <h2>Controls</h2>
        <ul>
          <li><span class="key">&#8592;&#8593;&#8594;&#8595;</span> move</li>
          <li><span class="key">Space</span> fire</li>
          <li><span class="key">.</span> rest</li>
          <li><span class="key">h</span> heal</li>
        </ul>
      </div>
    </div>

    <div class="center-column">
      <h1>aMaze</h1>
      <span id="level-display">Level 1</span>
      <canvas id="maze-canvas"></canvas>
    </div>

    <div class="side-panel mob-info">
      <div class="mob-entry hidden" id="dragon-entry">
        <h2 id="dragon-name">???</h2>
        <div class="stat-row">
          <span class="stat-label">Health</span>
          <div id="dragon-health-bar" class="health-bar dragon-health-bar">
            <div id="dragon-health-fill"></div>
          </div>
        </div>
      </div>

      <div class="mob-entry hidden" id="nigel-entry">
        <h2 id="nigel-name">???</h2>
        <div class="stat-row">
          <span class="stat-label">Health</span>
          <div id="nigel-health-bar" class="health-bar nigel-health-bar">
            <div id="nigel-health-fill"></div>
          </div>
        </div>
      </div>
    </div>
  </main>
  <div id="game-over-overlay" class="hidden">
    <div class="game-over-box">
      <h2>Game Over</h2>
      <button id="restart-btn">Restart</button>
    </div>
  </div>
  <script src="game.js"></script>
</body>
</html>
